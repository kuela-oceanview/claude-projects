<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      margin-bottom: 1.5rem;
      color: #a78bfa;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      min-height: 1.5em;
      color: #c4b5fd;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #1e1e2e;
      border: 2px solid #312e81;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #2a2a3e;
      transform: scale(1.04);
    }

    .cell.x { color: #f472b6; }
    .cell.o { color: #38bdf8; }

    .cell.win {
      background: #2e1065;
      border-color: #7c3aed;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #restart {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart:hover { background: #6d28d9; }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #94a3b8;
    }

    #score span { color: #e2e8f0; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <button id="restart">New Game</button>
  <div id="score">
    X wins: <span id="xwins">0</span>
    &nbsp;|&nbsp;
    Draws: <span id="draws">0</span>
    &nbsp;|&nbsp;
    O wins: <span id="owins">0</span>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over, score = { X: 0, O: 0, D: 0 };

    const boardEl  = document.getElementById('board');
    const statusEl = document.getElementById('status');

    function init() {
      board   = Array(9).fill(null);
      current = 'X';
      over    = false;
      render();
      statusEl.textContent = `Player X's turn`;
    }

    function render() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val ?? '';
        cell.addEventListener('click', () => move(i));
        boardEl.appendChild(cell);
      });
    }

    function move(i) {
      if (over || board[i]) return;
      board[i] = current;
      const win = checkWin();
      if (win) {
        render();
        win.forEach(idx => boardEl.children[idx].classList.add('win'));
        statusEl.textContent = `Player ${current} wins!`;
        score[current]++;
        updateScore();
        over = true;
      } else if (board.every(Boolean)) {
        render();
        statusEl.textContent = `It's a draw!`;
        score.D++;
        updateScore();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        render();
        statusEl.textContent = `Player ${current}'s turn`;
      }
    }

    function checkWin() {
      for (const line of WINS) {
        const [a, b, c] = line;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
      }
      return null;
    }

    function updateScore() {
      document.getElementById('xwins').textContent = score.X;
      document.getElementById('owins').textContent = score.O;
      document.getElementById('draws').textContent = score.D;
    }

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
